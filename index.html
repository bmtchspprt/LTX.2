<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Interactive Wiring Guide</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .board-container {
            width: 900px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
        }

        /* Hover interactions for the wiring guide */
        .component {
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .component:hover {
            filter: brightness(1.3);
        }
        
        .label-text {
            fill: white;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="board-container">
    <svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="780" height="430" rx="40" fill="#4a4d4e" />
        <rect x="30" y="30" width="740" height="390" rx="30" fill="#333" />
        
        <rect x="50" y="50" width="700" height="350" rx="10" fill="#7b1113" />

        <g class="component" id="display-section">
            <rect x="150" y="80" width="120" height="60" rx="4" fill="#111" />
            <text x="160" y="125" fill="#333" font-family="monospace" font-size="50">8.8.8.</text>
            <text x="280" y="90" class="label-text">Menu</text>
            <circle cx="295" cy="115" r="15" fill="#222" stroke="white" />
            <text x="340" y="90" class="label-text">Select</text>
            <circle cx="355" cy="115" r="15" fill="#222" stroke="white" />
        </g>

        <g class="component" id="terminals">
            <rect x="80" y="180" width="80" height="60" fill="#888" />
            <text x="80" y="260" class="label-text" font-size="10">DC IN | GND | SHLD</text>
            <rect x="180" y="180" width="120" height="60" fill="#888" />
            <text x="180" y="260" class="label-text" font-size="10">DC Out | B- | A+ | GND | SHLD</text>
            <text x="195" y="280" class="label-text">RS-485 1</text>
        </g>

        <g class="component" id="expansion">
            <rect x="410" y="80" width="140" height="180" fill="none" stroke="white" stroke-width="1" />
            <text x="430" y="120" class="label-text">EXPANSION PORT 1</text>
            <rect x="570" y="80" width="140" height="180" fill="none" stroke="white" stroke-width="1" />
            <text x="590" y="120" class="label-text">EXPANSION PORT 2</text>
        </g>

        <g class="component" id="info-section">
            <rect x="410" y="280" width="60" height="60" rx="4" fill="#555" />
            <text x="410" y="355" class="label-text">Ethernet</text>
            
            <text x="550" y="320" fill="white" font-size="35" font-weight="bold">LTX-100</text>
            <text x="550" y="340" fill="white" font-size="10">PCB: 1700-84 Rev 5</text>
            <text x="550" y="355" fill="white" font-size="10">BOM: X00-84 Rev</text>
        </g>

        <circle cx="70" cy="70" r="8" fill="#aaa" />
        <circle cx="730" cy="70" r="8" fill="#aaa" />
        <circle cx="70" cy="380" r="8" fill="#aaa" />
        <circle cx="730" cy="380" r="8" fill="#aaa" />
    </svg>
</div>

</body>
</html>
