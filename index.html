<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Coordinate Mapper</title>
    <style>
        body { 
            background-color: #121212; 
            color: #00ffff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            margin: 0; 
            font-family: monospace; 
        }

        .header {
            padding: 20px;
            background: #1a1a1a;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .coord-display { font-size: 18px; min-width: 200px; }

        button {
            padding: 8px 16px;
            background: #00ffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #121212;
        }

        .board-container { 
            position: relative; 
            width: 1000px; 
            margin-top: 40px;
            cursor: crosshair;
        }

        .base-img { width: 100%; display: block; pointer-events: none; }

        /* The Grid Overlay */
        #grid-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .grid-line { stroke: #00ffff; stroke-width: 0.25; opacity: 0.5; }
        .grid-text { fill: #00ffff; font-size: 8px; }

        /* Mouse Crosshair Lines */
        #crosshair-v { position: absolute; top: 0; width: 0.25px; height: 100%; background: rgba(0, 255, 255, 0.8); display: none; }
        #crosshair-h { position: absolute; left: 0; height: 0.25px; width: 100%; background: rgba(0, 255, 255, 0.8); display: none; }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="toggleGrid()">Toggle Grid</button>
        <div class="coord-display">X: <span id="valX">0</span>% | Y: <span id="valY">0</span>%</div>
    </div>

    <div class="board-container" id="mapper" onmousemove="updateCoords(event)" onmouseenter="showCrosshair(true)" onmouseleave="showCrosshair(false)">
        <img src="ltx-100-base.png" class="base-img">

        <div id="crosshair-v"></div>
        <div id="crosshair-h"></div>

        <svg id="grid-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
                <pattern id="minorGrid" width="2" height="2" patternUnits="userSpaceOnUse">
                    <path d="M 2 0 L 0 0 0 2" fill="none" stroke="#00ffff" stroke-width="0.1" opacity="0.2"/>
                </pattern>
                <pattern id="majorGrid" width="10" height="10" patternUnits="userSpaceOnUse">
                    <rect width="10" height="10" fill="url(#minorGrid)"/>
                    <path d="M 10 0 L 0 0 0 10" fill="none" class="grid-line"/>
                </pattern>
            </defs>
            <rect width="100" height="100" fill="url(#majorGrid)" />
            
            <g id="labels">
                <script>
                    const svg = document.getElementById('labels');
                    for(let i=10; i<100; i+=10) {
                        svg.innerHTML += `<text x="${i+0.5}" y="3" class="grid-text">${i}%</text>`;
                        svg.innerHTML += `<text x="0.5" y="${i+0.5}" class="grid-text">${i}%</text>`;
                    }
                </script>
            </g>
        </svg>
    </div>

    <script>
        const grid = document.getElementById('grid-layer');
        const vLine = document.getElementById('crosshair-v');
        const hLine = document.getElementById('crosshair-h');
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        const container = document.getElementById('mapper');

        function toggleGrid() {
            grid.style.display = (grid.style.display === 'none' || grid.style.display === '') ? 'block' : 'none';
        }

        function showCrosshair(show) {
            const display = show ? 'block' : 'none';
            vLine.style.display = display;
            hLine.style.display = display;
        }

        function updateCoords(e) {
            const rect = container.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            
            const cleanX = x.toFixed(1);
            const cleanY = y.toFixed(1);

            valX.innerText = cleanX;
            valY.innerText = cleanY;

            vLine.style.left = cleanX + '%';
            hLine.style.top = cleanY + '%';
        }
    </script>

</body>
</html>
