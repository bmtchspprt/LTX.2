<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Technical Reference</title>
    <style>
        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Metallic Enclosure using CSS Gradients */
        .enclosure {
            width: 960px;
            height: 520px;
            background: linear-gradient(145deg, #a1a3a4, #6e7071);
            border-radius: 45px;
            padding: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Inner Housing Bezel */
        .bezel {
            width: 95%;
            height: 90%;
            background: #232526;
            border-radius: 35px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .pcb { fill: #7b1113; }
        .label { fill: white; font-family: "Segoe UI", sans-serif; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .terminal-body { fill: #717375; stroke: #4a4a4a; stroke-width: 1; }
        .terminal-metal { fill: #a1a1a1; }
        .display-bg { fill: #1a1a1a; stroke: #444; }
        .screw { fill: url(#screwGradient); stroke: #666; stroke-width: 0.5; }
    </style>
</head>
<body>

<div class="enclosure">
    <div class="bezel">
        <svg viewBox="0 0 850 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="screwGradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#d1d1d1" />
                    <stop offset="100%" style="stop-color:#7a7a7a" />
                </radialGradient>
            </defs>

            <rect x="25" y="25" width="800" height="350" rx="8" class="pcb" />

            <g id="display">
                <rect x="150" y="60" width="130" height="75" rx="4" class="display-bg" />
                <text x="160" y="120" font-family="monospace" font-size="60" fill="#2a0000">8.8.8.</text>
                
                <text x="295" y="65" class="label" font-size="12">Menu</text>
                <circle cx="312" cy="95" r="18" fill="#222" stroke="#666" />
                <rect x="305" y="90" width="14" height="10" rx="2" fill="#111" />

                <text x="360" y="65" class="label" font-size="12">Select</text>
                <circle cx="377" cy="95" r="18" fill="#222" stroke="#666" />
                <rect x="370" y="90" width="14" height="10" rx="2" fill="#111" />
                
                <rect x="210" y="145" width="25" height="12" rx="2" fill="#333" />
                <text x="205" y="170" class="label" font-size="9">USB C</text>
            </g>

            <g id="terminals">
                <rect x="60" y="200" width="85" height="65" rx="2" class="terminal-body" />
                <path d="M70,210 h15 v20 h-15 z M95,210 h15 v20 h-15 z M120,210 h15 v20 h-15 z" class="terminal-metal" />
                <text x="60" y="285" class="label" font-size="9">DC IN | GND | SHLD</text>
                
                <rect x="165" y="200" width="125" height="65" rx="2" class="terminal-body" />
                <path d="M175,210 h12 v20 h-12 z M195,210 h12 v20 h-12 z M215,210 h12 v20 h-12 z M235,210 h12 v20 h-12 z M255,210 h12 v20 h-12 z" class="terminal-metal" />
                <text x="165" y="285" class="label" font-size="9">DC Out | B- | A+ | GND | SHLD</text>
                <text x="200" y="310" class="label" font-size="14">RS-485 1</text>
            </g>

            <g id="expansion">
                <rect x="420" y="60" width="170" height="220" fill="none" stroke="white" stroke-opacity="0.5" />
                <text x="440" y="100" class="label">Expansion Port 1</text>
                
                <rect x="610" y="60" width="170" height="220" fill="none" stroke="white" stroke-opacity="0.5" />
                <text x="630" y="100" class="label">Expansion Port 2</text>
                
                <rect x="535" y="235" width="45" height="35" rx="2" fill="#444" />
                <text x="530" y="285" class="label" font-size="9">SIM Card</text>
            </g>

            <g id="branding">
                <rect x="420" y="300" width="60" height="50" rx="3" fill="#222" />
                <text x="420" y="370" class="label">Ethernet</text>
                
                <text x="580" y="335" font-size="42" font-weight="900" fill="white">LTX-100</text>
                <text x="582" y="355" class="label" font-weight="normal" style="opacity:0.8">PCB: 1700-84 Rev 5</text>
                <text x="582" y="370" class="label" font-weight="normal" style="opacity:0.8">BOM: X00-84 Rev</text>
            </g>

            <circle cx="45" cy="45" r="10" class="screw" />
            <circle cx="805" cy="45" r="10" class="screw" />
            <circle cx="215" cy="360" r="10" class="screw" />
            <circle cx="765" cy="360" r="10" class="screw" />
        </svg>
    </div>
</div>

</body>
</html>
