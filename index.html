<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BinMaster RMA Credit Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Orange focus states to match hardware terminals */
        input:focus, select:focus {
            outline: none;
            border-color: #f97316 !important;
            ring: 2px;
            ring-color: #fb923c;
        }
    </style>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <div class="max-w-5xl mx-auto bg-white shadow-lg rounded-xl overflow-hidden border border-gray-200">
        <div class="bg-gray-800 p-4 border-b border-gray-700">
            <h2 class="text-xl font-bold text-white tracking-wide uppercase">RMA Credit Calculation Table</h2>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-semibold">
                    <tr>
                        <th class="px-6 py-4 border-b">Type</th>
                        <th class="px-6 py-4 border-b">Return</th>
                        <th class="px-6 py-4 border-b">Invoiced Amt</th>
                        <th class="px-6 py-4 border-b text-orange-600">Restock %</th>
                        <th class="px-6 py-4 border-b">Credit Total</th>
                        <th class="px-6 py-4 border-b">Code</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100" id="calc-body">
                    </tbody>
            </table>
        </div>
        
        <div class="bg-gray-50 p-4 text-right border-t border-gray-200">
            <span class="text-sm text-gray-500 italic">Calculations update automatically on input.</span>
        </div>
    </div>

    <script>
        const types = [
            { name: 'SIMP RET', defaultRestock: 25, returnReq: 'yes' },
            { name: 'CUST ERROR', defaultRestock: 25, returnReq: 'yes' },
            { name: 'WARRANTY', defaultRestock: 0, returnReq: 'yes' },
            { name: 'BM ERROR', defaultRestock: 0, returnReq: 'yes' },
            { name: 'PROD FLAW', defaultRestock: 0, returnReq: 'yes' },
            { name: 'STRATEGIC', defaultRestock: 0, returnReq: 'no' },
            { name: 'MISAPPLIED', defaultRestock: 0, returnReq: 'yes' }
        ];

        const tbody = document.getElementById('calc-body');

        function updateCredit(row) {
            const invoice = parseFloat(row.querySelector('.invoice-input').value) || 0;
            const restock = parseFloat(row.querySelector('.restock-input').value) || 0;
            const creditDisplay = row.querySelector('.credit-total');
            
            const total = invoice - (invoice * (restock / 100));
            creditDisplay.innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        types.forEach(type => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-orange-50/50 transition-colors";
            tr.innerHTML = `
                <td class="px-6 py-4 font-bold text-gray-700">${type.name}</td>
                <td class="px-6 py-4">
                    <select class="bg-white border border-gray-300 rounded px-2 py-1 text-sm focus:border-orange-500">
                        <option value="yes" ${type.returnReq === 'yes' ? 'selected' : ''}>yes</option>
                        <option value="no" ${type.returnReq === 'no' ? 'selected' : ''}>no</option>
                    </select>
                </td>
                <td class="px-6 py-4">
                    <div class="flex items-center">
                        <span class="text-gray-400 mr-1">$</span>
                        <input type="number" step="0.01" class="invoice-input w-24 border border-gray-300 rounded px-2 py-1 text-sm" placeholder="0.00">
                    </div>
                </td>
                <td class="px-6 py-4">
                    <div class="flex items-center">
                        <input type="number" class="restock-input w-16 border border-gray-300 rounded px-2 py-1 text-sm font-medium text-orange-700" value="${type.defaultRestock}">
                        <span class="text-gray-400 ml-1">%</span>
                    </div>
                </td>
                <td class="px-6 py-4 font-mono font-bold text-green-600 credit-total">$0.00</td>
                <td class="px-6 py-4">
                    <input type="text" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" placeholder="Ref code...">
                </td>
            `;

            tr.addEventListener('input', () => updateCredit(tr));
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
