<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Terminal Mapper</title>
    <style>
        body { 
            background: #0f0f0f;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            margin: 0; 
            font-family: 'Courier New', monospace;
        }

        .header {
            padding: 20px;
            background: #1a1a1a;
            width: 100%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        button {
            background: #00ffff;
            border: none;
            color: #0f0f0f;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .board-container { 
            position: relative; 
            width: 1000px; 
            margin: 40px 0;
        }

        .base-img { width: 100%; display: block; }

        /* Component Box Styles */
        .terminal-box {
            position: absolute;
            border: 1px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            display: none; /* Toggleable */
            align-items: center;
            justify-content: center;
            color: #00ffff;
            font-size: 10px;
            font-weight: bold;
            pointer-events: auto;
        }

        .terminal-box:hover { background: rgba(0, 255, 255, 0.4); }
        .show-map .terminal-box { display: flex; }
    </style>
</head>
<body class="show-map">

    <div class="header">
        <button onclick="document.body.classList.toggle('show-map')">Toggle Terminal Grid</button>
    </div>

    <div class="board-container">
        <img src="ltx-100-base.png" alt="LTX-100" class="base-img">

        <div class="terminal-box" style="top: 40.2%; left: 12.3%; width: 2.7%; height: 14.8%;">G3.1</div>
        <div class="terminal-box" style="top: 40.2%; left: 15.0%; width: 2.7%; height: 14.8%;">G3.2</div>
        <div class="terminal-box" style="top: 40.2%; left: 17.7%; width: 2.7%; height: 14.8%;">G3.3</div>

        <div class="terminal-box" style="top: 40.2%; left: 21.8%; width: 2.1%; height: 14.8%;">G4.1</div>
        <div class="terminal-box" style="top: 40.2%; left: 23.9%; width: 2.1%; height: 14.8%;">G4.2</div>
        <div class="terminal-box" style="top: 40.2%; left: 26.0%; width: 2.1%; height: 14.8%;">G4.3</div>
        <div class="terminal-box" style="top: 40.2%; left: 28.1%; width: 2.1%; height: 14.8%;">G4.4</div>
        <div class="terminal-box" style="top: 40.2%; left: 30.2%; width: 2.1%; height: 14.8%;">G4.5</div>

        <div class="terminal-box" style="top: 40.2%; left: 33.4%; width: 2.1%; height: 14.8%;">G5.1</div>
        <div class="terminal-box" style="top: 40.2%; left: 35.5%; width: 2.1%; height: 14.8%;">G5.2</div>
        <div class="terminal-box" style="top: 40.2%; left: 37.6%; width: 2.1%; height: 14.8%;">G5.3</div>
        <div class="terminal-box" style="top: 40.2%; left: 39.7%; width: 2.1%; height: 14.8%;">G5.4</div>
        <div class="terminal-box" style="top: 40.2%; left: 41.8%; width: 2.1%; height: 14.8%;">G5.5</div>

        <div class="terminal-box" style="top: 18.8%; left: 20.1%; width: 13.2%; height: 10.5%;">G1</div>
        <div class="terminal-box" style="top: 18.8%; left: 34.8%; width: 10.8%; height: 10.5%;">G2</div>
    </div>

</body>
</html>
