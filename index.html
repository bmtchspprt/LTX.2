<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Grid Identifier</title>
    <style>
        body { 
            background-color: #121212; 
            color: #00ffff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            margin: 0; 
            font-family: 'Courier New', monospace; 
        }

        .header {
            padding: 15px;
            background: #1a1a1a;
            width: 100%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            background: #00ffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #121212;
            text-transform: uppercase;
        }

        .board-container { 
            position: relative; 
            width: 1000px; 
            margin: 40px 0;
        }

        .base-img { width: 100%; display: block; }

        /* The Numbered Grid Overlay */
        #grid-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Toggleable */
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            pointer-events: none;
        }

        .grid-box {
            border: 0.25px solid rgba(0, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(0, 255, 255, 0.7);
        }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="toggleGrid()">Toggle ID Grid</button>
    </div>

    <div class="board-container">
        <img src="ltx-100-base.png" class="base-img">

        <div id="grid-layer">
            </div>
    </div>

    <script>
        // Generate the 10x10 grid with G1 - G100 identifiers
        const gridLayer = document.getElementById('grid-layer');
        for (let i = 1; i <= 100; i++) {
            const box = document.createElement('div');
            box.className = 'grid-box';
            box.innerText = 'G' + i;
            gridLayer.appendChild(box);
        }

        function toggleGrid() {
            const grid = document.getElementById('grid-layer');
            grid.style.display = (grid.style.display === 'none' || grid.style.display === '') ? 'grid' : 'none';
        }
    </script>

</body>
</html>
