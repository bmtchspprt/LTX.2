<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Wiring Guide</title>
    <style>
        body {
            background-color: #1a1a1a; /* Your site background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .board-container {
            position: relative;
            width: 1000px; /* Adjust based on your needs */
        }

        .base-image {
            width: 100%;
            display: block;
        }

        /* This is where we will later "overlay" wires and digital panels */
        .overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="board-container">
        <img src="ltx-100-base.png" alt="LTX-100 Board" class="base-image">
        
        <div class="overlay-layer" id="interactivity"></div>
    </div>

</body>
</html>
