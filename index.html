<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Technical Guide</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
            font-family: sans-serif;
        }

        .board-container {
            position: relative;
            width: 900px; /* This controls the size on your screen */
        }

        .base-image {
            width: 100%;
            display: block;
        }

        /* Use this class for any text or wires you want to 'float' over the board */
        .overlay {
            position: absolute;
            color: cyan;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="board-container">
        <img src="ltx-100-base.png" alt="LTX-100 Board" class="base-image">
        
        <div class="overlay" style="top: 75%; left: 12%;">
            Connect 24V DC Here
        </div>
    </div>

</body>
</html>
