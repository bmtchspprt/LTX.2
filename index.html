<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Interface</title>
    <style>
        body { 
            background: #0f0f0f; color: #00ffff;
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; font-family: 'Courier New', monospace;
        }

        .header {
            padding: 15px; background: #1a1a1a; width: 100%;
            display: flex; justify-content: center;
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;
        }

        .board-container { 
            position: relative; width: 1000px; margin: 20px 0;
            user-select: none;
        }

        .base-img { width: 100%; display: block; pointer-events: none; }

        .finished-box {
            position: absolute; border: 1px solid #00ffff;
            background: rgba(0, 255, 255, 0.05); color: #00ffff;
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: bold;
            visibility: hidden; /* Hidden by default */
        }

        /* Toggle State */
        .show-grid .finished-box {
            visibility: visible;
        }

        button {
            padding: 10px 20px; background: #00ffff; border: none; 
            cursor: pointer; font-weight: bold; border-radius: 3px;
            text-transform: uppercase; color: #1a1a1a;
        }

        button:hover { background: #00cccc; }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="document.body.classList.toggle('show-grid')">Show Grid</button>
    </div>

    <div class="board-container" id="canvas">
        <img src="ltx-100-base.png" alt="LTX-100" class="base-img">
        
        <div class="finished-box" style="top: 18.8%; left: 20.1%; width: 13.2%; height: 10.5%;">G1</div>
        <div class="finished-box" style="top: 18.8%; left: 34.8%; width: 10.8%; height: 10.5%;">G2</div>
        <div class="finished-box" style="top: 40.2%; left: 12.3%; width: 2.7%; height: 14.8%;">G3.1</div>
        <div class="finished-box" style="top: 40.2%; left: 15.0%; width: 2.7%; height: 14.8%;">G3.2</div>
        <div class="finished-box" style="top: 40.2%; left: 17.7%; width: 2.7%; height: 14.8%;">G3.3</div>
        </div>

</body>
</html>
