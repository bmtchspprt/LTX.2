<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Element Mapper</title>
    <style>
        body { 
            background-color: #121212; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 40px; 
            margin: 0; 
            font-family: 'Courier New', monospace; 
        }

        .controls { margin-bottom: 20px; }
        
        button {
            padding: 10px 20px;
            background: #00ffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #121212;
        }

        .board-container { 
            position: relative; 
            width: 1000px; 
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
        }

        .base-img { width: 100%; display: block; }

        /* Component Box Styles */
        .element-box {
            position: absolute;
            border: 1.5px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            font-weight: bold;
            font-size: 14px;
            pointer-events: auto;
            transition: background 0.2s;
            display: none; /* Toggleable */
        }

        .element-box:hover {
            background: rgba(0, 255, 255, 0.3);
        }

        /* Logic for showing/hiding */
        .show-boxes .element-box { display: flex; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="document.body.classList.toggle('show-boxes')">Toggle Element Boxes</button>
    </div>

    <div class="board-container">
        <img src="ltx-100-base.png" alt="LTX-100" class="base-img">

        <div class="element-box" style="top: 18%; left: 20%; width: 14%; height: 11%;">G1</div>

        <div class="element-box" style="top: 18%; left: 34.5%; width: 11%; height: 11%;">G2</div>

        <div class="element-box" style="top: 40%; left: 12%; width: 9%; height: 15%;">G3</div>

        <div class="element-box" style="top: 40%; left: 21.5%; width: 11%; height: 15%;">G4</div>

        <div class="element-box" style="top: 40%; left: 33%; width: 11%; height: 15%;">G5</div>

        <div class="element-box" style="top: 18%; left: 45%; width: 18%; height: 45%;">G6</div>

        <div class="element-box" style="top: 18%; left: 63.5%; width: 18%; height: 45%;">G7</div>

        <div class="element-box" style="top: 50%; left: 52%; width: 5%; height: 10%;">G8</div>

        <div class="element-box" style="top: 67%; left: 45.5%; width: 7%; height: 13%;">G9</div>

        <div class="element-box" style="top: 42%; left: 81%; width: 5%; height: 25%;">G10</div>
    </div>

</body>
</html>
