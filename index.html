<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Wiring Interface</title>
    <style>
        body { background-color: #121212; display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .board-wrapper { width: 1000px; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8)); }
        text { font-family: 'Segoe UI', Arial, sans-serif; fill: white; pointer-events: none; }
        .label { font-size: 10px; font-weight: bold; }
        .terminal-box { fill: #75787b; stroke: #4a4a4a; }
        .pcb-red { fill: #7b1113; }
    </style>
</head>
<body>

<div class="board-wrapper">
    <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,20 h900 a30,30 0 0 1 30,30 v400 a30,30 0 0 1 -30,30 h-900 a30,30 0 0 1 -30,-30 v-400 a30,30 0 0 1 30,-30" fill="#8e9091"/>
        <path d="M80,50 h840 a20,20 0 0 1 20,20 v360 a20,20 0 0 1 -20,20 h-840 a20,20 0 0 1 -20,-20 v-360 a20,20 0 0 1 20,-20" fill="#2b2d2f"/>
        
        <rect x="100" y="70" width="800" height="360" rx="10" class="pcb-red" />

        <rect x="200" y="100" width="120" height="70" rx="5" fill="#1a1a1a" />
        <text x="210" y="155" font-family="monospace" font-size="55" fill="#444">8.8.8.</text>
        
        <text x="350" y="95" class="label">Menu</text>
        <circle cx="365" cy="125" r="18" fill="#222" stroke="#666" />
        <rect x="358" y="120" width="14" height="10" fill="#111" />

        <text x="410" y="95" class="label">Select</text>
        <circle cx="425" cy="125" r="18" fill="#222" stroke="#666" />
        <rect x="418" y="120" width="14" height="10" fill="#111" />

        <rect x="120" y="200" width="80" height="60" class="terminal-box" />
        <text x="120" y="275" class="label">DC IN  GND  SHLD</text>

        <rect x="220" y="200" width="110" height="60" class="terminal-box" />
        <text x="220" y="275" class="label">DC Out B- A+ GND SHLD</text>
        <text x="245" y="300" class="label" style="font-size:14px">RS-485 1</text>

        <circle cx="150" cy="340" r="15" fill="#111" stroke="#555" />
        <text x="175" y="340" class="label">Power</text>
        <text x="175" y="355" class="label">(9V - 30V)</text>

        <rect x="480" y="90" width="160" height="200" fill="none" stroke="white" stroke-width="1" />
        <text x="500" y="130" class="label" style="font-size:12px">EXPANSION PORT 1</text>
        <rect x="540" y="240" width="40" height="40" fill="#555" />
        <text x="535" y="295" class="label">SIM Card</text>

        <rect x="480" y="310" width="60" height="60" rx="5" fill="#333" />
        <text x="480" y="385" class="label">Ethernet</text>

        <text x="630" y="340" font-size="38" font-weight="bold">LTX-100</text>
        <text x="630" y="365" class="label" style="font-weight:normal">PCB: 1700-84 Rev 5</text>
        <text x="630" y="385" class="label" style="font-weight:normal">BOM: X00-84 Rev</text>

        <circle cx="125" cy="95" r="10" fill="#999" stroke="#666" />
        <circle cx="875" cy="95" r="10" fill="#999" stroke="#666" />
        <circle cx="250" cy="405" r="10" fill="#999" stroke="#666" />
        <circle cx="750" cy="405" r="10" fill="#999" stroke="#666" />
    </svg>
</div>

</body>
</html>
