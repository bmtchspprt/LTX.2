<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX-100 Box Creator</title>
    <style>
        body { 
            background: #0f0f0f; color: #00ffff;
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; font-family: 'Courier New', monospace;
        }
        .header {
            padding: 15px; background: #1a1a1a; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000;
        }
        .board-container { 
            position: relative; width: 1000px; margin: 20px 0;
            cursor: crosshair; user-select: none;
        }
        .base-img { width: 100%; display: block; pointer-events: none; }
        #active-box {
            position: absolute; border: 1.5px solid #00ffff;
            background: rgba(0, 255, 255, 0.2); pointer-events: none; display: none;
        }
        .finished-box {
            position: absolute; border: 1px solid #00ffff;
            background: rgba(0, 255, 255, 0.1); color: #00ffff;
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold;
        }
        .output-area {
            width: 900px; background: #1a1a1a; padding: 20px;
            border: 1px solid #333; margin-bottom: 40px; color: #aaa;
        }
        pre { background: #000; padding: 10px; color: #00ff00; overflow-x: auto; font-size: 12px; }
        button {
            padding: 8px 15px; background: #c0392b; color: white; border: none; 
            cursor: pointer; font-weight: bold; border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight:bold">MODE: DRAWING BOXES</span>
        <button onclick="location.reload()">Reset & Start Over</button>
    </div>

    <div class="board-container" id="canvas">
        <img src="ltx-100-base.png" class="base-img">
        <div id="active-box"></div>
    </div>

    <div class="output-area">
        <h3>Generated Coordinates:</h3>
        <p>As you draw, copy these lines to save them:</p>
        <pre id="code-output"></pre>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const activeBox = document.getElementById('active-box');
        const codeOutput = document.getElementById('code-output');
        
        let startX, startY, isDrawing = false;
        let boxCount = 0;

        canvas.addEventListener('mousedown', e => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = ((e.clientX - rect.left) / rect.width) * 100;
            startY = ((e.clientY - rect.top) / rect.height) * 100;
            activeBox.style.display = 'block';
            activeBox.style.left = startX + '%';
            activeBox.style.top = startY + '%';
            activeBox.style.width = '0%';
            activeBox.style.height = '0%';
        });

        canvas.addEventListener('mousemove', e => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            let currentX = ((e.clientX - rect.left) / rect.width) * 100;
            let currentY = ((e.clientY - rect.top) / rect.height) * 100;

            let left = currentX < startX ? currentX : startX;
            let top = currentY < startY ? currentY : startY;
            let width = Math.abs(currentX - startX);
            let height = Math.abs(currentY - startY);

            activeBox.style.left = left + '%';
            activeBox.style.top = top + '%';
            activeBox.style.width = width + '%';
            activeBox.style.height = height + '%';
        });

        window.addEventListener('mouseup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            activeBox.style.display = 'none';
            boxCount++;

            const finalBox = document.createElement('div');
            finalBox.className = 'finished-box';
            finalBox.style.left = activeBox.style.left;
            finalBox.style.top = activeBox.style.top;
            finalBox.style.width = activeBox.style.width;
            finalBox.style.height = activeBox.style.height;
            finalBox.innerText = boxCount;
            canvas.appendChild(finalBox);

            // Update Code Output
            const line = `<div class="finished-box" style="top: ${activeBox.style.top}; left: ${activeBox.style.left}; width: ${activeBox.style.width}; height: ${activeBox.style.height};">${boxCount}</div>\n`;
            codeOutput.innerText += line;
        });
    </script>
</body>
</html>
