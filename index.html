<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BST Support - LTX-100 Wiring Guide</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* The Board Container */
        .board-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two halves */
            grid-template-rows: auto auto;    /* Two rows */
            gap: 0; /* Tight fit to look like one board */
            width: 90vw;
            max-width: 1200px;
            border: 10px solid #4a4a4a; /* External Housing */
            border-radius: 20px;
            overflow: hidden;
            background-color: #7b1113; /* PCB Red background */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .section {
            position: relative;
            overflow: hidden;
        }

        .section img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Optional Hover Effect for Interaction */
        .section:hover {
            filter: brightness(1.1);
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="board-container">
        <div class="section" id="top-left">
            <img src="top-left-display.jpg" alt="Display and Menu Buttons">
        </div>

        <div class="section" id="top-right">
            <img src="top-right-expansion.jpg" alt="Expansion Ports and SIM Card">
        </div>

        <div class="section" id="bottom-left">
            <img src="bottom-left-power.jpg" alt="Power and RS-485 Terminals">
        </div>

        <div class="section" id="bottom-right">
            <img src="bottom-right-labels.jpg" alt="Ethernet Port and Model Info">
        </div>
    </div>

</body>
</html>
